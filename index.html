<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and Registration</title>
    <!-- Load Lottie Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.14/lottie.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            width: 300px;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
        .button:hover {
            background-color: #0056b3;
        }
        .toggle-link {
            display: block;
            margin-top: 10px;
            text-align: center;
            color: #007bff;
            cursor: pointer;
        }
        .toggle-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container" id="login-container">
        <h2>Login</h2>
        <div class="form-group">
            <label for="login-email">Email:</label>
            <input type="email" id="login-email" required>
        </div>
        <div class="form-group">
            <label for="login-password">Password:</label>
            <input type="password" id="login-password" required>
        </div>
        <button class="button" onclick="handleLogin()">Login</button>
        <div class="toggle-link" onclick="toggleForm()">Don't have an account? Register here.</div>
    </div>

    <div class="container" id="register-container" style="display: none;">
        <h2>Register</h2>
        <div class="form-group">
            <label for="register-email">Email:</label>
            <input type="email" id="register-email" required>
        </div>
        <div class="form-group">
            <label for="register-password">Password:</label>
            <input type="password" id="register-password" required>
        </div>
        <button class="button" onclick="handleRegister()">Register</button>
        <div class="toggle-link" onclick="toggleForm()">Already have an account? Login here.</div>
    </div>

    <!-- Lottie Animation Container -->
    <div id="lottie-animation" style="width: 100px; height: 100px;"></div>

    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-analytics.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA1W0rNXV78mQV4WX3JljmPewRP1-DtZiU",
            authDomain: "synapse-social-sai.firebaseapp.com",
            databaseURL: "https://synapse-social-sai-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "synapse-social-sai",
            storageBucket: "synapse-social-sai.firebasestorage.app",
            messagingSenderId: "269633434355",
            appId: "1:269633434355:web:4b8a8c50f1001aeaa3bd86",
            measurementId: "G-3BLHJ42D92"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const analytics = getAnalytics(app);

        // Load the Lottie animation
        var animation = lottie.loadAnimation({
            container: document.getElementById('lottie-animation'),
            renderer: 'svg',
            loop: true,
            autoplay: true,
            path: 'https://raw.githubusercontent.com/StudioAsInc/web/refs/heads/main/loader.json'
        });

        window.handleLogin = function() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Signed in
                    window.location.href = 'assets/sai/index.html';
                })
                .catch((error) => {
                    const errorCode = error.code;
                    const errorMessage = error.message;
                    alert("Login failed: " + errorMessage);
                });
        }

        window.handleRegister = function() {
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Registration successful
                    alert("Registration successful!");
                    toggleForm(); // Switch to login form
                })
                .catch((error) => {
                    const errorCode = error.code;
                    const errorMessage = error.message;
                   alert("Registration failed: " + errorMessage);

                });
        }

        window.toggleForm = function() {
            var loginContainer = document.getElementById('login-container');
            var registerContainer = document.getElementById('register-container');
            if (loginContainer.style.display === 'none') {
                loginContainer.style.display = 'block';
                registerContainer.style.display = 'none';
            } else {
                loginContainer.style.display = 'none';
                registerContainer.style.display = 'block';
            }
        }
    </script>

    <!-- Credits -->
    <!-- Code by Md Ashik (https://github.com/studioasinc) -->
</body>
</html>
