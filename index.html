<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and Registration</title>
    <!-- Load Lottie Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.14/lottie.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            width: 300px;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
        .button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        <div class="form-group">
            <label for="login-email">Email:</label>
            <input type="email" id="login-email" required>
        </div>
        <div class="form-group">
            <label for="login-password">Password:</label>
            <input type="password" id="login-password" required>
        </div>
        <button class="button" onclick="handleLogin()">Login</button>
    </div>

    <div class="container">
        <h2>Register</h2>
        <div class="form-group">
            <label for="register-email">Email:</label>
            <input type="email" id="register-email" required>
        </div>
        <div class="form-group">
            <label for="register-password">Password:</label>
            <input type="password" id="register-password" required>
        </div>
        <button class="button" onclick="handleRegister()">Register</button>
    </div>

    <!-- Lottie Animation Container -->
    <div id="lottie-animation" style="width: 100px; height: 100px;"></div>

    <script>
        // Load the Lottie animation
        var animation = lottie.loadAnimation({
            container: document.getElementById('lottie-animation'), // the DOM element to contain the animation
            renderer: 'svg',
            loop: true,
            autoplay: true,
            path: 'https://raw.githubusercontent.com/StudioAsInc/web/refs/heads/main/loader.json' // the path to the animation json
        });

        function handleLogin() {
            // Add your login logic here
            // For now, we will just redirect
            window.location.href = 'assets/sai/index.html';
        }

        function handleRegister() {
            // Add your registration logic here
            alert('Registration successful!');
        }
    </script>

    <!-- Credits -->
    <!-- Code by Md Ashik (https://github.com/studioasinc) -->
</body>
</html>
