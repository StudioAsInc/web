<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I ❤️ You Animation</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #fff5f5;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            align-items: center;
            position: relative;
        }
        
        .bar {
            width: 20px;
            height: 60px;
            background-color: #ff6b8b;
            position: relative;
            border-radius: 3px;
        }
        
        #left-bar {
            margin-right: 15px;
            animation: squeezeLeft 8s infinite;
        }
        
        #right-bar {
            margin-left: 15px;
            animation: squeezeRight 8s infinite;
        }
        
        .text {
            font-size: 32px;
            font-weight: bold;
            color: #d23369;
            min-width: 180px;
            text-align: center;
            transform-origin: center;
            animation: bounce 8s infinite;
        }
        
        @keyframes squeezeLeft {
            0%, 100% { transform: translateX(0); }
            12.5% { transform: translateX(10px); }
            25%, 50%, 75% { transform: translateX(20px); }
            87.5% { transform: translateX(30px); }
        }
        
        @keyframes squeezeRight {
            0%, 100% { transform: translateX(0); }
            12.5% { transform: translateX(-10px); }
            25%, 50%, 75% { transform: translateX(-20px); }
            87.5% { transform: translateX(-30px); }
        }
        
        @keyframes bounce {
            0%, 25%, 50%, 75%, 100% { transform: scale(1); }
            12.5% { transform: scale(0.9); }
            37.5% { transform: scale(0.95); }
            62.5% { transform: scale(0.92); }
            87.5% { transform: scale(0.85); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bar" id="left-bar"></div>
        <div class="text" id="love-text">I Love You</div>
        <div class="bar" id="right-bar"></div>
    </div>

    <script>
        const textElement = document.getElementById('love-text');
        const texts = ["I Love You", "I ❤️ You", "I ❤️ U", "❤️"];
        let currentIndex = 0;
        
        function updateText() {
            currentIndex = (currentIndex + 1) % texts.length;
            textElement.textContent = texts[currentIndex];
        }
        
        // Change text at specific intervals to match the animation
        setTimeout(() => updateText(), 2000); // First change at 2s
        setTimeout(() => updateText(), 4000); // Second change at 4s
        setTimeout(() => updateText(), 6000); // Third change at 6s
        
        // Set up the repeating cycle
        setInterval(() => {
            currentIndex = -1; // Reset to start from "I Love You" again
            updateText();
        }, 8000); // Full cycle every 8s
    </script>
</body>
</html>
