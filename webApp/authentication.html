<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-container" id="login-container">
          <h2>Login</h2>
            <form id="login-form">
              <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Login</button>
              </form>
            <button id="goto-register">Need an account? Register here</button>
        </div>
        <div class="form-container" id="register-container" style="display:none">
          <h2>Register</h2>
          <form id="register-form">
              <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Register</button>
            </form>
          <button id="goto-login">Already have an account? Login here</button>
        </div>
        <div id="message" class="message" style="display: none;"></div>
    </div>
   <!-- The core Firebase JS SDK is always required and must be listed first -->
   <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>

   <!-- If you enabled Analytics in your project, add the Firebase SDK for Analytics -->
   <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics.js"></script>

  <!-- Add Firebase Authentication -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>

    <script src="script.js"></script>
</body>
</html>
